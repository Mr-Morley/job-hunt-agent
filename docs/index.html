<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Hunt Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Score badge colours */
    .score-high   { background:#dcfce7; color:#166534; }
    .score-mid    { background:#fef9c3; color:#854d0e; }
    .score-low    { background:#ffedd5; color:#9a3412; }
    /* Source pill colours */
    .src-linkedin { background:#dbeafe; color:#1e40af; }
    .src-careers24{ background:#f3e8ff; color:#6b21a8; }
    .src-other    { background:#f3f4f6; color:#374151; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">

  <!-- Header -->
  <header class="bg-white border-b shadow-sm sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-gray-900">Job Hunt Board</h1>
        <p class="text-xs text-gray-400 mt-0.5">AI-curated listings · updated daily</p>
      </div>
      <span id="lastUpdated" class="text-xs text-gray-400"></span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">

    <!-- Filter bar -->
    <div class="bg-white rounded-xl border shadow-sm p-4 mb-5 flex flex-wrap gap-3 items-center">
      <input id="search" type="text" placeholder="Search title, company, reason…"
        class="flex-1 min-w-48 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <select id="regionFilter"
        class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">All regions</option>
        <option value="South Africa">South Africa</option>
        <option value="Ireland">Ireland</option>
      </select>

      <select id="sourceFilter"
        class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">All sources</option>
      </select>

      <div class="flex items-center gap-2">
        <label class="text-sm text-gray-500 whitespace-nowrap">Min score</label>
        <input id="minScore" type="range" min="4" max="10" value="6" class="w-24 accent-blue-600" />
        <span id="minScoreVal" class="text-sm font-semibold w-4 text-blue-600">6</span>
      </div>
    </div>

    <!-- Stats bar -->
    <p id="stats" class="text-sm text-gray-500 mb-4"></p>

    <!-- Cards -->
    <div id="listings" class="space-y-3"></div>

    <!-- Empty state -->
    <div id="empty" class="hidden text-center py-20 text-gray-400">
      <svg class="mx-auto mb-4 w-12 h-12 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-lg font-medium">No listings match your filters.</p>
      <p class="text-sm mt-1">Try lowering the minimum score or clearing the search.</p>
    </div>

    <!-- Loading state -->
    <div id="loading" class="text-center py-20 text-gray-400">
      <p class="text-lg">Loading listings…</p>
    </div>

  </main>

  <script>
    let allJobs = [];

    // -----------------------------------------------------------------------
    // Rendering helpers
    // -----------------------------------------------------------------------

    function scoreClass(s) {
      if (s >= 8) return 'score-high';
      if (s >= 6) return 'score-mid';
      return 'score-low';
    }

    function sourceClass(src) {
      if (src === 'LinkedIn')  return 'src-linkedin';
      if (src === 'Careers24') return 'src-careers24';
      return 'src-other';
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderCard(job) {
      const salary = job.salary
        ? `<span class="inline-block text-green-700 text-xs font-semibold bg-green-50 px-2 py-0.5 rounded-full">${esc(job.salary)}</span>`
        : '';
      const reason = job.relevance_reason
        ? `<p class="text-sm text-gray-500 italic mt-2 leading-snug">${esc(job.relevance_reason)}</p>`
        : '';
      const dateLabel = job.first_seen
        ? `Seen ${job.first_seen}`
        : (job.date_posted ? `Posted ${job.date_posted}` : '');

      return `
        <article class="bg-white rounded-xl border shadow-sm p-5 hover:shadow-md transition-shadow">
          <div class="flex items-start gap-4">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-2 mb-1">
                <span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${scoreClass(job.relevance_score)}">
                  ${job.relevance_score}/10
                </span>
                <span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${sourceClass(job.source)}">
                  ${esc(job.source)}
                </span>
                ${salary}
              </div>
              <h2 class="text-base font-semibold text-gray-900 leading-tight">${esc(job.title)}</h2>
              <p class="text-sm text-gray-600 mt-0.5">
                ${esc(job.company)}
                <span class="text-gray-400 mx-1">·</span>
                <span class="text-gray-500">${esc(job.location)}</span>
              </p>
              ${reason}
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
              <a href="${esc(job.url)}" target="_blank" rel="noopener noreferrer"
                 class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 active:bg-blue-800 transition-colors whitespace-nowrap">
                Apply →
              </a>
              <span class="text-xs text-gray-400">${dateLabel}</span>
            </div>
          </div>
        </article>`;
    }

    // -----------------------------------------------------------------------
    // Filter + render
    // -----------------------------------------------------------------------

    function render() {
      const query  = document.getElementById('search').value.toLowerCase().trim();
      const region = document.getElementById('regionFilter').value;
      const source = document.getElementById('sourceFilter').value;
      const minScore = parseInt(document.getElementById('minScore').value, 10);

      const filtered = allJobs.filter(j => {
        if (j.relevance_score < minScore) return false;
        if (region && !j.location.includes(region)) return false;
        if (source && j.source !== source) return false;
        if (query) {
          const hay = [j.title, j.company, j.relevance_reason, j.location]
            .join(' ').toLowerCase();
          if (!hay.includes(query)) return false;
        }
        return true;
      });

      const container = document.getElementById('listings');
      const empty     = document.getElementById('empty');
      const stats     = document.getElementById('stats');

      stats.textContent = `Showing ${filtered.length} of ${allJobs.length} listing${allJobs.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
      } else {
        empty.classList.add('hidden');
        container.innerHTML = filtered.map(renderCard).join('');
      }
    }

    // -----------------------------------------------------------------------
    // Initialise
    // -----------------------------------------------------------------------

    async function init() {
      try {
        const resp = await fetch('data/jobs.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        allJobs = await resp.json();
      } catch (e) {
        allJobs = [];
        console.warn('Could not load jobs.json:', e);
      }

      document.getElementById('loading').remove();

      // Populate source dropdown from data
      const sources = [...new Set(allJobs.map(j => j.source))].sort();
      const srcSel = document.getElementById('sourceFilter');
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        srcSel.appendChild(opt);
      });

      // Show when the data was last generated
      if (allJobs.length > 0) {
        const dates = allJobs.map(j => j.last_seen).filter(Boolean).sort().reverse();
        if (dates.length) {
          document.getElementById('lastUpdated').textContent = `Last updated ${dates[0]}`;
        }
      }

      // Wire up events
      ['search', 'regionFilter', 'sourceFilter'].forEach(id =>
        document.getElementById(id).addEventListener('input', render));

      document.getElementById('minScore').addEventListener('input', e => {
        document.getElementById('minScoreVal').textContent = e.target.value;
        render();
      });

      render();
    }

    init();
  </script>

</body>
</html>
